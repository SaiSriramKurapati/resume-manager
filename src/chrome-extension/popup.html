<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="styles.css" />
    <script src="supabase-js.js"></script>
  </head>
  <body>
    <div id="app">
      <div class="header">
        <div class="header-content">
          <div class="logo">
            <div class="logo-icon">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <polyline points="14,2 14,8 20,8" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <line x1="16" y1="13" x2="8" y2="13" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <line x1="16" y1="17" x2="8" y2="17" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <polyline points="10,9 9,9 8,9" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <h3>Resume Manager</h3>
          </div>
          <div id="close-popup">&times;</div>
        </div>
      </div>
      
      <div id="login-section" style="display: none;">
        <div class="login-container">
          <div class="login-header">
            <div class="login-icon">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" stroke="#6366f1" stroke-width="2"/>
                <circle cx="12" cy="16" r="1" fill="#6366f1"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <h4>Welcome Back</h4>
            <p>Sign in to access your resumes</p>
          </div>
          <form id="login-form">
            <div class="input-group">
              <div class="input-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                  <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" stroke="#9ca3af" stroke-width="2"/>
                  <polyline points="22,6 12,13 2,6" stroke="#9ca3af" stroke-width="2"/>
                </svg>
              </div>
              <input type="email" id="email" placeholder="Email address" required>
            </div>
            <div class="input-group">
              <div class="input-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2" stroke="#9ca3af" stroke-width="2"/>
                  <circle cx="12" cy="16" r="1" fill="#9ca3af"/>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="#9ca3af" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
              <input type="password" id="password" placeholder="Password" required>
            </div>
            <button type="submit" id="login-btn">
              <span>Sign In</span>
              <div class="loader" style="display: none;"></div>
            </button>
          </form>
          <p id="login-error" class="error"></p>
        </div>
      </div>
      
      <div id="resume-section" style="display: none;">
        <div class="section-header">
          <div class="section-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
              <path d="M9 11h6m-6 4h6m-6-8h4m6-4H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7l-5-5z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <h4>Your Resumes</h4>
        </div>
        
        <div class="resume-container">
          <ul id="resume-list"></ul>
          <div id="loading-resumes" class="loader" style="display: none;"></div>
          <div id="no-resumes-message" class="empty-state" style="display: none;">
            <div class="empty-icon">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none">
                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" stroke="#9ca3af" stroke-width="2"/>
              </svg>
            </div>
            <p>No resumes found</p>
            <small>Upload resumes to your account to get started</small>
          </div>
        </div>
        
        <div id="action-buttons" style="display: none;">
          <button id="auto-fill-btn" class="primary-btn">
            <div class="btn-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="white"/>
              </svg>
            </div>
            <span>Auto-fill Resume</span>
            <div class="loader" style="display: none;"></div>
          </button>
          <p id="status-message" class="status"></p>
          <div class="info-card">
            <div class="info-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="12" r="10" stroke="#92400e" stroke-width="2"/>
                <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" stroke="#92400e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <line x1="12" y1="17" x2="12.01" y2="17" stroke="#92400e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <p>Your resume will be automatically detected and filled</p>
          </div>
        </div>
        
        <button id="logout-btn" class="secondary-btn">
          <div class="btn-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <polyline points="16 17 21 12 16 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <line x1="21" y1="12" x2="9" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <span>Sign Out</span>
        </button>
      </div>
    </div>

    <!-- Templates -->
    <template id="resume-item-template">
      <li class="resume-item">
        <div class="resume-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <polyline points="14,2 14,8 20,8" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <line x1="16" y1="13" x2="8" y2="13" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <line x1="16" y1="17" x2="8" y2="17" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="file-info">
          <span class="file-name"></span>
          <span class="file-meta">PDF Document</span>
        </div>
        <button class="preview-btn">
          <div class="preview-icon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="2"/>
              <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
            </svg>
          </div>
          <span>Preview</span>
        </button>
      </li>
    </template>

    <script src="popup.js"></script>
  </body>
</html>
